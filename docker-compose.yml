version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: internship-applicant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: internship_applicants
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: internship-applicant-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/internship_applicants?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/internship_applicants?schema=public
      JWT_SECRET: ${JWT_SECRET:-docker-compose-dev-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      PORT: 3000
      NODE_ENV: production
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@infnova.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
    ports:
      - '3000:3000'
    command: sh -c "npx prisma migrate deploy && node dist/prisma/seed.js && node dist/src/main.js"

volumes:
  postgres_data: